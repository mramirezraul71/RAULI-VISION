# RAULI-VISION — Render Blueprint
# Espejo y Proxy: rootDir obligatorio para que Go resuelva módulo e internos en monorepo.
# Rama: master (minúsculas). Tras el deploy, ESPEJO_URL debe apuntar a la URL del espejo.

services:
  - type: web
    name: espejo-backend
    runtime: go
    plan: starter
    branch: master
    rootDir: espejo
    buildCommand: >-
      go mod download &&
      go build -ldflags="-s -w" -o espejo ./cmd/server &&
      curl -fsSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"
      -o yt-dlp && chmod +x yt-dlp
    startCommand: ./espejo
    disk:
      name: vault-storage
      mountPath: /var/data/vault
      sizeGB: 20
    envVars:
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: VERSION
        value: "1.0.0"
      - key: VAULT_ROOT
        value: /var/data/vault
      - key: VAULT_ROTATION_DAYS
        value: "7"
      - key: VAULT_SCAN_HOURS
        value: "6"
      - key: VAULT_SEED_INTERVAL_DAYS
        value: "7"
      # Configura las fuentes de contenido en el Dashboard de Render:
      # VAULT_SEED_CAMI_MUSICA        — IDs/playlists YouTube para cami/musica (separados por coma)
      # VAULT_SEED_CAMI_PELICULAS     — IDs/playlists YouTube para cami/peliculas
      # VAULT_SEED_CAMI_MUSICVIDEOS   — IDs/playlists YouTube para cami/musicvideos
      # VAULT_SEED_VARIADO_MUSICA     — IDs/playlists YouTube para variado/musica
      # VAULT_SEED_VARIADO_PELICULAS  — IDs/playlists YouTube para variado/peliculas
      # VAULT_SEED_VARIADO_MUSICVIDEOS — IDs/playlists YouTube para variado/musicvideos
      - key: YTDLP_PATH
        value: "./yt-dlp"
    healthCheckPath: /api/health

  - type: web
    name: proxy-backend
    runtime: go
    plan: starter
    branch: master
    rootDir: cliente-local
    buildCommand: go mod download && CGO_ENABLED=0 go build -ldflags="-s -w" -o proxy ./cmd/proxy
    startCommand: ./proxy
    envVars:
      - key: PORT
        value: "3000"
      - key: ESPEJO_URL
        value: https://espejo-backend.onrender.com
        # Tras el primer deploy, si el nombre del servicio cambia, ajustar esta URL en el Dashboard de Render
      - key: CLIENT_ID
        generateValue: true
      - key: CLIENT_SECRET
        generateValue: true
      - key: VERSION
        value: "1.0.0"
    healthCheckPath: /api/health
